<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tost çeşitleri &amp; wrap — Babylon Cafe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/menu-doc.css" />
  <style>
  :root {
      --category-banner: url("assets/tostlar.webp");
    }

    .category-hero {
  width: 100%;
  height: 200px; /* Banner yüksekliği */
  background-image: var(--category-banner);
  background-size: cover;
  background-position: center;
  border-radius: 0 0 20px 20px; /* Alt köşeleri hafif yuvarlayalım şık dursun */
  margin-bottom: 20px;
}

    /* Fotoğrafsız Şık Liste Tasarımı İçin Eklenen CSS */
    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 0; /* Boşlukları sıfırlayıp çizgiyle ayıracağız */
    }
    .product-card {
      display: flex;
      width: 100%;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2); /* Altın rengi hafif bir alt çizgi */
      background: transparent;
      box-shadow: none;
    }
    .product-card:last-child {
      border-bottom: none; /* Listenin son elemanında çizgi olmasın */
    }
    .product-card__body {
      display: flex;
      width: 100%;
      justify-content: space-between; /* İsim solda, fiyat sağda */
      align-items: center;
      padding: 0;
    }
    .product-card__title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      color: #000000; /* Dark mode için beyaz yazı */
    }
    .product-card__price {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brand-gold, #d4af37); /* Fiyat Babylon altın sarısı */
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="brand" aria-label="Babylon Cafe ana sayfa">
<a href="index.html" class="brand" aria-label="Babylon Cafe ana sayfa">

    </a>
    <nav class="nav-desktop" aria-label="Ana navigasyon">
      <a href="index.html#hero">Ana Sayfa</a>
      <a href="index.html#menu">Menü</a>
      <a href="index.html#iletisim">İletişim</a>
    </nav>
    <button type="button" class="menu-toggle" aria-expanded="false" aria-controls="mobile-nav" aria-label="Menüyü aç">

  <nav id="mobile-nav" class="nav-drawer" aria-hidden="true" aria-label="Mobil menü">

    <a href="index.html#menu">Menü</a>
    <a href="index.html#iletisim">İletişim</a>

  </main>

  <script>
    (function () {
      var toggle = document.querySelector(".menu-toggle");
      var drawer = document.querySelector(".nav-drawer");
      var links = drawer.querySelectorAll("a");
      function setOpen(open) {
        toggle.setAttribute("aria-expanded", open);
        toggle.setAttribute("aria-label", open ? "Menüyü kapat" : "Menüyü aç");
        drawer.setAttribute("aria-hidden", !open);
        drawer.classList.toggle("is-open", open);
        document.body.style.overflow = open ? "hidden" : "";
      }
      toggle.addEventListener("click", function () {
        setOpen(toggle.getAttribute("aria-expanded") !== "true");
      });
      links.forEach(function (a) {
        a.addEventListener("click", function () { setOpen(false); });
      });
      window.addEventListener("resize", function () {
        if (window.matchMedia("(min-width: 1024px)").matches) setOpen(false);
      });
    })();
  </script>

</body>
</html>
